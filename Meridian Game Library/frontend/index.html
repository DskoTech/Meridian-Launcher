<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Meridian Game Library</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="horizon-glow"></div>
  <div id="bg-image-layer"></div>
  <canvas id="overlay-canvas"></canvas>

  <main id="app">
    <div id="top-bar">
      <div id="category-viewport">
        <div id="category-row"></div>
      </div>
      <div id="clock-wrap">
        <div id="clock"></div>
        <div id="battery-indicator" class="hidden">
          <svg id="battery-icon" viewBox="0 0 28 14" fill="none" stroke="currentColor" stroke-width="1.4">
            <rect x="1" y="1" width="22" height="12" rx="2"/>
            <rect x="24" y="4.5" width="2.5" height="5" rx="1" fill="currentColor" stroke="none"/>
            <rect id="battery-fill" x="3" y="3" width="18" height="8" rx="1" fill="currentColor" stroke="none"/>
          </svg>
          <span id="battery-pct"></span>
        </div>
      </div>
    </div>

    <div id="content-area">
      <div id="subfolder-nav" class="hidden"></div>
      <div id="item-panel"></div>
      <div id="preview-pane" class="hidden">
        <img id="preview-img" alt="" />
        <div id="preview-title"></div>
      </div>
    </div>

    <!-- Controls hint bar: text cleared per design (hidden in all themes
         via CSS). The element and its original controls markup are kept
         here, commented, for possible future use.
      <span>&#8592; &#8594; sections</span>
      <span>&#8593; &#8595; browse</span>
      <span id="hint-confirm">Enter select</span>
      <span id="hint-back">Space back</span>
      <span>Esc quit</span>
    -->
    <div id="hint-bar"></div>

    <div id="now-playing" class="hidden">
      <img id="np-thumb" alt="" />
      <div class="np-info">
        <div id="np-title">—</div>
        <div id="np-artist"></div>
      </div>
      <div id="np-progress"><div id="np-progress-fill"></div></div>
      <div id="np-controls">
        <button id="np-prev" title="Previous">&#9198;</button>
        <button id="np-play" title="Play/Pause">&#9208;</button>
        <button id="np-next" title="Next">&#9197;</button>
      </div>
    </div>
  </main>

  <audio id="audio-el" preload="none"></audio>

  <div id="video-overlay" class="overlay hidden">
    <video id="video-el" controls autoplay></video>
    <button class="overlay-close" id="video-close">&#10005;</button>
  </div>

  <div id="photo-overlay" class="overlay hidden">
    <img id="photo-el" alt="" />
    <button class="overlay-close" id="photo-close">&#10005;</button>
    <button class="overlay-nav" id="photo-prev">&#10094;</button>
    <button class="overlay-nav right" id="photo-next">&#10095;</button>
  </div>

  <div id="intro-overlay" class="overlay hidden">
    <video id="intro-video-el"></video>
  </div>

  <div id="modal-overlay" class="overlay hidden">
    <div id="modal-box">
      <h3 id="modal-title">New section</h3>
      <input id="modal-input" type="text" placeholder="Section name" maxlength="24" />
      <div id="modal-actions">
        <button id="modal-cancel">Cancel</button>
        <button id="modal-confirm">Create</button>
      </div>
    </div>
  </div>

  <div id="wifi-password-overlay" class="overlay hidden">
    <div id="modal-box">
      <h3 id="wifi-password-title">Network password</h3>
      <input id="wifi-password-input" type="password" placeholder="Password" maxlength="63" />
      <div id="modal-actions">
        <button id="wifi-password-cancel">Cancel</button>
        <button id="wifi-password-confirm">Connect</button>
      </div>
    </div>
  </div>

  <div id="network-overlay" class="overlay hidden">
    <div id="network-box">
      <div id="network-header">
        <h3 id="network-title">Wi-Fi</h3>
        <div id="network-header-actions">
          <button id="network-refresh" class="btn-outline">Scan</button>
          <button id="network-close" class="overlay-close-inline">&#10005;</button>
        </div>
      </div>
      <div id="network-list"></div>
    </div>
  </div>

  <div id="osk" class="hidden"></div>

  <div id="empty-toast" class="hidden"></div>

  <script src="app.js"></script>
</body>
</html>
